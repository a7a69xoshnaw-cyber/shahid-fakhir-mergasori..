<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خوێندنگەی شەهید فەخیر مەرجاسۆری</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

/* ONLY CHANGE = BACKGROUND */
body{
  background: url('/mnt/data/790b5d67-2fbb-4d67-b818-d11c0e786bd0.jpeg') no-repeat center center fixed;
  background-size: cover;
  color:#333;
  scroll-behavior:smooth;
}

nav{background:#2575fc;padding:15px 30px;display:flex;justify-content:center;gap:20px;position:sticky;top:0;z-index:1000; flex-wrap: wrap;}
nav a{text-decoration:none;color:white;font-weight:600;}
header{text-align:center;padding:60px 20px;background:linear-gradient(135deg,#4a148c,#1976d2);color:white;position:relative;}
section{padding:70px 20px;max-width:1200px;margin:auto;}
section h2{text-align:center;margin-bottom:30px;font-size:2.5em;color:#1976d2;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;margin-top:30px;}
.card{background:white;padding:22px;border-radius:14px;box-shadow:0 6px 12px rgba(0,0,0,0.1);}
footer{background:#1976d2;color:white;text-align:center;padding:20px;}

/* MUSIC EXACT SAME */
.music-container{position:fixed;bottom:20px;left:20px;background:white;border-radius:16px;padding:15px;box-shadow:0 5px 20px rgba(0,0,0,0.2);z-index:999;width:320px;border:2px solid #1976d2;}
.music-title{color:#1976d2;font-weight:700;margin-bottom:10px;text-align:center;font-size:16px;}
.music-iframe{width:100%;height:60px;border-radius:8px;border:1px solid #ddd;}
.music-note{text-align:center;font-size:12px;color:#666;margin-top:8px;}
</style>
</head>
<body dir="rtl">

<nav>
<a href="#home">سەرەتا</a>
<a href="#about">دەربارە</a>
<a href="#news">هەواڵەکان</a>
<a href="#contact">پەیوەندی</a>
</nav>

<header id="home">
<h1>خوێندنگەی شەهید فەخیر مەرجاسۆری</h1>
<p>بەخێربێن بۆ ماڵپەڕی فەرمی خوێندنگەکەمان</p>
</header>

<section id="about">
<h2>دەربارە</h2>
<div class="grid">
<div class="card"><h3>بینین</h3><p>خوێندنی باکیفی</p></div>
<div class="card"><h3>ئامانج</h3><p>گەشەپێدان</p></div>
</div>
</section>

<section id="news">
<h2>هەواڵەکان</h2>
<div class="grid">
<div class="card"><h3>کراوەیە</h3><p>خوێندن بەردەوامە</p></div>
</div>
</section>

<section id="contact">
<h2>پەیوەندی</h2>
<div class="grid">
<div class="card"><h3>هەولێر</h3></div>
</div>
</section>

<!-- ORIGINAL MUSIC -->
<div class="music-container">
  <div class="music-title">🎵 هەر کوردین و هەر کورد ئەبین</div>
  <iframe src="https://archive.org/embed/har-kurdin-w-har-kurd-abin" width="100%" height="60" frameborder="0" allowfullscreen class="music-iframe"></iframe>
  <div class="music-note">🔊 کرتە لەسەر دەنگی بکە بۆ گوێگرتن</div>
</div>

<footer>
<p>© 2026 School</p>
</footer>

</body>
</html>
